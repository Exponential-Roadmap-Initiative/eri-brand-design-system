<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>ERI Brand Design System</title>
    <meta name="description" content="The official Exponential Roadmap Initiative Brand Design System — colours, typography, components, and guidelines for all ERI digital products." />
    <!-- Favicon — PNG only (Manus hosting does not serve .ico correctly) -->
    <!-- White background, 12% corner radius, original green + black S-curve mark -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <!-- Apple Touch Icon: iOS home screen (180px) — white rounded variant -->
    <link rel="apple-touch-icon" sizes="180x180" href="https://d2xsxph8kpxj0f.cloudfront.net/310519663319595517/5mtZtU66sMbsnmPoVbf6UJ/favicon-white-rounded-180_2daaa7d4.png" />
    <!-- Android / PWA manifest icon (192px) — white rounded variant -->
    <link rel="icon" type="image/png" sizes="192x192" href="https://d2xsxph8kpxj0f.cloudfront.net/310519663319595517/5mtZtU66sMbsnmPoVbf6UJ/favicon-white-rounded-192_54fb4338.png" />
    <!-- Fonts: Archivo (headings) + Open Sans (body)
         Self-hosted WOFF2 via @font-face in index.css (GDPR-compliant — no external font requests)
         Font files: /fonts/Archivo-{400-800}.woff2, /fonts/OpenSans-{400,600,700}.woff2 -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>
</html>
