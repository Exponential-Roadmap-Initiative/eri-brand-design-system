<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>ERI Brand Design System</title>
    <meta name="description" content="The official Exponential Roadmap Initiative Brand Design System — colours, typography, components, and guidelines for all ERI digital products." />
    <!-- Favicon — multi-format for broad browser/OS support -->
    <!-- .ico: legacy browsers (IE, older Edge) — must be in /public/ -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <!-- PNG: modern browsers prefer this over .ico -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <!-- Apple Touch Icon: iOS home screen (180px) -->
    <link rel="apple-touch-icon" sizes="180x180" href="https://d2xsxph8kpxj0f.cloudfront.net/310519663319595517/5mtZtU66sMbsnmPoVbf6UJ/favicon-rounded-dark-180_c84fbe3e.png" />
    <!-- Android / PWA manifest icon (192px) -->
    <link rel="icon" type="image/png" sizes="192x192" href="https://d2xsxph8kpxj0f.cloudfront.net/310519663319595517/5mtZtU66sMbsnmPoVbf6UJ/favicon-rounded-dark-192_6ca6e763.png" />
    <!-- Fonts: Archivo (headings) + Open Sans (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,700&family=Open+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>
</html>
